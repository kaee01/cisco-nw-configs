! ============================================================
! L3SW-CORE-01 - Cisco Catalyst L3スイッチ コンフィグ
! 案件: Cisco無線NW / L2・L3スイッチ構築（架空企業想定）
! 作成目的: GitHubポートフォリオ用 自己研鑽アウトプット
! ============================================================

version 17.3
service timestamps debug datetime msec localtime
service timestamps log datetime msec localtime
service password-encryption
!
hostname L3SW-CORE-01
!
! --- ユーザー・認証設定 ---
enable secret 9 <secret-hash>
!
username admin privilege 15 secret 9 <secret-hash>
!
! --- AAA設定 ---
aaa new-model
aaa authentication login default local
aaa authorization exec default local
!
! --- IPドメイン・SSH設定 ---
ip domain-name corp.local
crypto key generate rsa modulus 2048
ip ssh version 2
ip ssh time-out 60
ip ssh authentication-retries 3
!
! --- VTP設定 ---
vtp mode transparent
!
! --- VLAN定義 ---
vlan 10
 name WIRELESS-CORP
!
vlan 20
 name WIRELESS-GUEST
!
vlan 30
 name WIRED-BUSINESS
!
vlan 100
 name SERVER
!
vlan 200
 name MGMT
!
vlan 999
 name UNUSED-SHUTDOWN
!
! --- L3スイッチング有効化 ---
ip routing
!
! --- SVIインターフェース定義 ---
interface Vlan10
 description WIRELESS-CORP-GW
 ip address 192.168.10.1 255.255.255.0
 no ip proxy-arp
 no shutdown
!
interface Vlan20
 description WIRELESS-GUEST-GW
 ip address 192.168.20.1 255.255.255.0
 no ip proxy-arp
 no shutdown
!
interface Vlan30
 description WIRED-BUSINESS-GW
 ip address 192.168.30.1 255.255.255.0
 no ip proxy-arp
 no shutdown
!
interface Vlan100
 description SERVER-GW
 ip address 192.168.100.1 255.255.255.0
 no ip proxy-arp
 no shutdown
!
interface Vlan200
 description MGMT-GW
 ip address 172.16.0.1 255.255.255.0
 no ip proxy-arp
 no shutdown
!
! --- アップリンク（ルータ/FW向け）---
interface GigabitEthernet1/0/1
 description UPLINK-TO-ROUTER-01
 switchport mode trunk
 switchport trunk allowed vlan 10,20,30,100,200
 switchport trunk native vlan 999
 no shutdown
!
! --- ダウンリンク（L2SW向け）---
interface GigabitEthernet1/0/2
 description DOWNLINK-TO-L2SW-HQ-F1-01
 switchport mode trunk
 switchport trunk allowed vlan 10,20,30,200
 switchport trunk native vlan 999
 no shutdown
!
interface GigabitEthernet1/0/3
 description DOWNLINK-TO-L2SW-HQ-F2-01
 switchport mode trunk
 switchport trunk allowed vlan 10,20,30,200
 switchport trunk native vlan 999
 no shutdown
!
! --- WLC向け ---
interface GigabitEthernet1/0/10
 description DOWNLINK-TO-WLC-CISCO-01
 switchport mode trunk
 switchport trunk allowed vlan 10,20,200
 switchport trunk native vlan 999
 no shutdown
!
! --- 未使用ポート ---
interface range GigabitEthernet1/0/20 - 24
 description UNUSED
 switchport mode access
 switchport access vlan 999
 shutdown
!
! --- STP設定 ---
spanning-tree mode rapid-pvst
spanning-tree vlan 10 priority 4096
spanning-tree vlan 20 priority 4096
spanning-tree vlan 30 priority 4096
spanning-tree vlan 100 priority 4096
spanning-tree vlan 200 priority 4096
spanning-tree vlan 999 priority 4096
!
! --- デフォルトルート ---
ip route 0.0.0.0 0.0.0.0 172.16.0.254
!
! --- ゲストVLANのACL（社内アクセス禁止） ---
ip access-list extended ACL-GUEST-RESTRICT
 10 deny   ip 192.168.20.0 0.0.0.255 192.168.10.0 0.0.0.255
 20 deny   ip 192.168.20.0 0.0.0.255 192.168.30.0 0.0.0.255
 30 deny   ip 192.168.20.0 0.0.0.255 192.168.100.0 0.0.0.255
 40 deny   ip 192.168.20.0 0.0.0.255 172.16.0.0 0.0.0.255
 50 permit ip 192.168.20.0 0.0.0.255 any
!
interface Vlan20
 ip access-group ACL-GUEST-RESTRICT in
!
! --- 管理アクセスACL ---
ip access-list standard ACL-MGMT-ACCESS
 10 permit 172.16.0.0 0.0.0.255
 20 deny   any log
!
! --- NTP設定 ---
ntp server 131.107.13.100
clock timezone JST 9 0
!
! --- Syslog設定 ---
logging host 172.16.0.254
logging trap informational
logging on
!
! --- SNMP設定 ---
snmp-server community <community-string> RO ACL-MGMT-ACCESS
snmp-server enable traps
snmp-server host 172.16.0.254 <community-string>
!
! --- VTY・コンソール設定 ---
line con 0
 login authentication default
 exec-timeout 5 0
 logging synchronous
!
line vty 0 15
 access-class ACL-MGMT-ACCESS in
 login authentication default
 transport input ssh
 exec-timeout 5 0
!
! --- バナー ---
banner motd ^
*****************************************************
* Authorized Access Only                            *
* Unauthorized access is strictly prohibited        *
*****************************************************
^
!
end
