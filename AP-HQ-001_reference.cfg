! ============================================================
! AP-HQ-001 - Cisco AP 参考設定（WLC管理下）
! 案件: Cisco無線NW 構築（架空企業想定）
! 作成目的: GitHubポートフォリオ用 自己研鑽アウトプット
! ============================================================
!
! ============================================================
! 【重要】APはWLC集中管理（CAPWAP）のため
!         個別CLIでの設定はほぼ不要。
!         設定はWLC管理画面から一括配布される。
!         本ファイルはトラブル時・確認用の参考設定。
! ============================================================

! ============================================================
! 【1】AP基本情報（機器台帳参照）
! ============================================================
!
! ホスト名    : AP-HQ-001
! 設置場所    : 本社 HQフロア（架空）
! MACアドレス : XX:XX:XX:XX:XX:XX（機器台帳記載）
! 管理IP      : 172.16.0.51（WLC経由DHCPで払い出し）
! 接続PoESW   : L2SW-HQ-F1-01 Gi1/0/2（PoE給電）
! 接続WLC     : WLC-CISCO-01（Primary）/ WLC-CISCO-02（Secondary）
! FW Version  : WLC管理画面から自動配布
!

! ============================================================
! 【2】WLC管理画面からの設定内容（GUI操作）
! ============================================================
!
! [ホスト名・場所設定]
!   Wireless > Access Points > [AP] > General
!     AP Name    : AP-HQ-001
!     Location   : HQ-1F-AREA-A（架空）
!
! [HA設定]
!   Wireless > Access Points > [AP] > High Availability
!     Primary Controller   : WLC-CISCO-01
!     Secondary Controller : WLC-CISCO-02
!
! [SSID確認（WLCから自動配布）]
!   SSID1: <corp-ssid-name>   VLAN10 / WPA2-AES / 802.1X
!   SSID2: <guest-ssid-name>  VLAN20 / WPA2-AES / PSK
!
! [RF設定（RRMにより自動）]
!   2.4GHz Channel: Auto（RRM）
!   5GHz   Channel: Auto（RRM）
!   Tx Power      : Auto（RRM）
!

! ============================================================
! 【3】AP CLI確認コマンド（WLC経由でアクセス）
! ============================================================
!
! WLC CLI から AP CLI にアクセスする方法:
!   debug ap enable AP-HQ-001
!
! AP CLI で使用する主要確認コマンド:
!   show version                --- FWバージョン確認
!   show capwap client rcb      --- CAPWAPトンネル状態確認
!   show interface dot11Radio 0 --- 2.4GHz インターフェース確認
!   show interface dot11Radio 1 --- 5GHz インターフェース確認
!   show ip interface brief     --- IPアドレス確認
!   show controllers dot11Radio --- 電波出力・チャンネル確認
!
! WLC CLI 側での AP 確認コマンド:
!   show ap summary             --- AP接続一覧（全台）
!   show ap config general AP-HQ-001  --- AP個別設定詳細
!   show ap stats AP-HQ-001     --- AP統計情報
!

! ============================================================
! 【4】CAPWAP接続トラブルシューティング
! ============================================================
!
! APがWLCに接続されない場合の切り分け:
!   1. PoE給電確認
!      L2SW> show power inline Gi1/0/2
!      → Delivering または On であること
!
!   2. L2疎通確認（VLAN200）
!      L3SW> ping 172.16.0.51
!      → Reply受信であること
!
!   3. APのIPアドレス確認（AP CLI）
!      AP> show ip interface brief
!      → 172.16.0.51/24 が払い出されていること
!
!   4. CAPWAPトンネル確認（AP CLI）
!      AP> show capwap client rcb
!      → WLC IPが表示されCAPWAPステートがRUN
!
!   5. WLC管理画面で確認
!      Wireless > Access Points > All APs
!      → AP-HQ-001 が Registered 状態
!
! CAPWAP使用ポート:
!   UDP 5246 (CAPWAP Control)
!   UDP 5247 (CAPWAP Data)
!   → FW・ACLでこれらのポートが開いていることを確認
!

! ============================================================
! EOF
! ============================================================
